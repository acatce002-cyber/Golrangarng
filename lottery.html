<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قرعه‌کشی طلایی گلهای رنگارنگ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0a; color: #ffd700; font-family: 'Vazirmatn', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .lux-bg { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #2a2a00 0%, #000 100%); z-index: -1; }
        
        h1 { font-family: 'Lalezar', cursive; font-size: 50px; margin: 30px 0; text-shadow: 0 0 20px #ffd700; }
        
        .wheel-container { position: relative; width: 350px; height: 350px; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 10px solid #d4af37; box-shadow: 0 0 50px rgba(212,175,55,0.4); transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); position: relative; overflow: hidden; }
        
        .icon { position: absolute; font-size: 30px; top: 20%; left: 40%; transform-origin: 50px 150px; }
        
        .input-box { margin-top: 50px; display: flex; flex-direction: column; gap: 10px; width: 300px; }
        input { padding: 15px; border-radius: 30px; border: 2px solid #d4af37; background: #1a1a1a; color: #fff; text-align: center; }
        button { padding: 15px; border-radius: 30px; border: none; background: #d4af37; color: #000; font-weight: bold; cursor: pointer; }
        
        .modal { display: none; position: fixed; top:0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 99; }
        .modal-content { background: #1a1a1a; padding: 40px; border: 2px solid #d4af37; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="lux-bg"></div>
    <h1>✨ قرعه‌کشی طلایی ✨</h1>
    
    <div class="wheel-container">
        <div class="wheel" id="wheel">
            <!-- چیدمان نمادین گرافیکی -->
            <div class="icon" style="transform: rotate(0deg);">🚗</div>
            <div class="icon" style="transform: rotate(51deg);">🚲</div>
            <div class="icon" style="transform: rotate(102deg);">📱</div>
            <div class="icon" style="transform: rotate(153deg);">💵</div>
            <div class="icon" style="transform: rotate(204deg);">💵</div>
            <div class="icon" style="transform: rotate(255deg);">💵</div>
            <div class="icon" style="transform: rotate(306deg);">❌</div>
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="code" placeholder="کد طلایی خود را وارد کنید">
        <button onclick="spin()">چرخش گردونه</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="result-text"></h2>
            <p>برای دریافت جایزه، این کد را به پشتیبانی بفرستید: <b id="tracking"></b></p>
            <button onclick="document.getElementById('modal').style.display='none'">بستن</button>
        </div>
    </div>

    <script>
        const spinSound = new Audio('https://www.soundjay.com/misc/sounds/magic-chime-01.mp3');
        const winSound = new Audio('https://www.soundjay.com/human/sounds/applause-01.mp3');

        function spin() {
            spinSound.play();
            const wheel = document.getElementById('wheel');
            const randomRotation = Math.floor(Math.random() * 3600) + 1800;
            wheel.style.transform = `rotate(${randomRotation}deg)`;
            
            setTimeout(() => {
                winSound.play();
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
                document.getElementById('modal').style.display = 'flex';
                document.getElementById('result-text').innerText = "تبریک! شما برنده شدید!";
                document.getElementById('tracking').innerText = Math.floor(Math.random()*900000);
            }, 4200);
        }
    </script>
</body>
</html>
